app = 'hayashi-dev'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  SERVER_PORT = '8080'

[processes]
  app = "node apps/server/dist/server.js"
  worker = "node apps/server/dist/worker.js"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep machines alive for WebSocket persistence
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  processes = ['app']
  size = 'shared-cpu-2x'
  memory = '2gb'

[[vm]]
  processes = ['worker']
  size = 'performance-2x'
