name: Plugin Native Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Hayashi build id
        required: true
        type: string
      target:
        description: Build target
        required: true
        type: string
      environment:
        description: GitHub Actions environment name
        required: true
        type: string
      server_url:
        description: Hayashi server base URL
        required: true
        type: string

jobs:
  linux:
    if: contains(inputs.target, '-linux-')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 60
    env:
      HAYASHI_BUILD_ID: ${{ inputs.build_id }}
      HAYASHI_BUILD_SERVER_URL: ${{ inputs.server_url }}
      HAYASHI_BUILD_SECRET: ${{ secrets.HAYASHI_BUILD_RUNNER_SECRET }}
      DPF_PATH: ${{ github.workspace }}/.dpf
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      ENABLE_ELEMENTS_PLUGIN_UI: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y faust make g++ tar
      - name: Install npm dependencies
        run: npm ci
      - name: Build server bundle
        run: npm --workspace @hayashi/server run build
      - name: Fetch DPF
        run: git clone --depth 1 https://github.com/DISTRHO/DPF.git "$GITHUB_WORKSPACE/.dpf"
      - name: Run remote build
        run: node apps/server/dist/export/github-build-runner.js

  windows:
    if: contains(inputs.target, '-windows-')
    runs-on: windows-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 75
    env:
      HAYASHI_BUILD_ID: ${{ inputs.build_id }}
      HAYASHI_BUILD_SERVER_URL: ${{ inputs.server_url }}
      HAYASHI_BUILD_SECRET: ${{ secrets.HAYASHI_BUILD_RUNNER_SECRET }}
      DPF_PATH: ${{ github.workspace }}\\.dpf
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      ENABLE_ELEMENTS_PLUGIN_UI: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          path-type: inherit
          install: >-
            git
            tar
            perl
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
      - name: Install Faust
        shell: powershell
        run: choco install faust --yes
      - name: Resolve Faust on PATH
        shell: powershell
        run: |
          $candidates = @(
            "C:\ProgramData\chocolatey\bin",
            "C:\Program Files\Faust\bin",
            "C:\tools\faust\bin"
          )
          foreach ($dir in $candidates) {
            $exe = Join-Path $dir "faust.exe"
            if (Test-Path $exe) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
              Write-Host "Found faust.exe at $exe"
              exit 0
            }
          }
          $command = Get-Command faust -ErrorAction SilentlyContinue
          if ($command) {
            Split-Path $command.Source | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Resolved faust command at $($command.Source)"
            exit 0
          }
          throw "faust.exe not found after Chocolatey install"
      - name: Resolve Faust include path
        shell: powershell
        run: |
          $candidates = @(
            "C:\Program Files\Faust\include",
            "C:\Program Files\Faust\share\faust",
            "C:\tools\faust\include",
            "C:\tools\faust\share\faust"
          )
          foreach ($dir in $candidates) {
            $header = Join-Path $dir "faust\dsp\dsp.h"
            if (Test-Path $header) {
              "FAUST_INCLUDE_PATH=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              Write-Host "Found Faust headers at $dir"
              exit 0
            }
          }
          throw "Faust include path not found after Chocolatey install"
      - name: Install npm dependencies
        run: npm ci
      - name: Build server bundle
        run: npm --workspace @hayashi/server run build
      - name: Fetch DPF
        shell: msys2 {0}
        run: git clone --depth 1 https://github.com/DISTRHO/DPF.git "$(cygpath "$GITHUB_WORKSPACE")/.dpf"
      - name: Run remote build
        shell: msys2 {0}
        run: node apps/server/dist/export/github-build-runner.js

  macos_intel:
    if: inputs.target == 'vst3-macos-x64' || inputs.target == 'clap-macos-x64'
    runs-on: macos-13
    environment: ${{ inputs.environment }}
    timeout-minutes: 60
    env:
      HAYASHI_BUILD_ID: ${{ inputs.build_id }}
      HAYASHI_BUILD_SERVER_URL: ${{ inputs.server_url }}
      HAYASHI_BUILD_SECRET: ${{ secrets.HAYASHI_BUILD_RUNNER_SECRET }}
      DPF_PATH: ${{ github.workspace }}/.dpf
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      ENABLE_ELEMENTS_PLUGIN_UI: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: brew install faust
      - name: Install npm dependencies
        run: npm ci
      - name: Build server bundle
        run: npm --workspace @hayashi/server run build
      - name: Fetch DPF
        run: git clone --depth 1 https://github.com/DISTRHO/DPF.git "$GITHUB_WORKSPACE/.dpf"
      - name: Run remote build
        run: node apps/server/dist/export/github-build-runner.js

  macos_arm64:
    if: inputs.target == 'vst3-macos-arm64' || inputs.target == 'clap-macos-arm64'
    runs-on: macos-14
    environment: ${{ inputs.environment }}
    timeout-minutes: 60
    env:
      HAYASHI_BUILD_ID: ${{ inputs.build_id }}
      HAYASHI_BUILD_SERVER_URL: ${{ inputs.server_url }}
      HAYASHI_BUILD_SECRET: ${{ secrets.HAYASHI_BUILD_RUNNER_SECRET }}
      DPF_PATH: ${{ github.workspace }}/.dpf
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL_S3: ${{ secrets.AWS_ENDPOINT_URL_S3 }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
      ENABLE_ELEMENTS_PLUGIN_UI: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: brew install faust
      - name: Install npm dependencies
        run: npm ci
      - name: Build server bundle
        run: npm --workspace @hayashi/server run build
      - name: Fetch DPF
        run: git clone --depth 1 https://github.com/DISTRHO/DPF.git "$GITHUB_WORKSPACE/.dpf"
      - name: Run remote build
        run: node apps/server/dist/export/github-build-runner.js
