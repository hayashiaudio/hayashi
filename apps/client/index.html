<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hayashi — Prompt to Plugin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="hayashi-fallback" style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#faf8f5;color:#1a1a2e;font-family:'DM Sans',sans-serif;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;margin:0 auto 1.25rem;border:3px solid rgba(15,15,26,0.08);border-top-color:#ff8c61;border-radius:50%;animation:hayashi-spin 1s linear infinite;"></div>
          <div style="font-size:1.1rem;font-weight:600;letter-spacing:-0.02em;color:#0f0f1a;">Hayashi</div>
          <div style="margin-top:0.4rem;opacity:0.45;font-size:0.875rem;color:#6b6b7b;">Loading...</div>
        </div>
      </div>
    </div>
    <style>
      @keyframes hayashi-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      window.__hayashiLog = function(msg) {
        try { console.log('[HayashiHTML]', msg); } catch(e) {}
      };
      window.__hayashiLog('HTML loaded. frame_id=' + (new URLSearchParams(location.search).has('frame_id') ? 'yes' : 'no'));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
